<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>백운중 이차방정식 카드 놀이</title>
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #f3f4f6; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        h1 { color: #1f2937; font-size: 24px; margin-bottom: 20px; }
        
        /* 24개 카드 그리드 배치 (모바일은 4칸, PC는 6칸) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 500px;
            margin: 0 auto;
        }
        @media (min-width: 768px) {
            .grid-container { grid-template-columns: repeat(6, 1fr); max-width: 800px; }
        }

        /* 카드 정사각형 유지 */
        .card {
            aspect-ratio: 1 / 1;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            width: 100%; height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-face {
            width: 100%; height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-size: 14px;
            font-weight: bold;
            padding: 8px;
            box-sizing: border-box;
            word-break: keep-all;
        }
        
        /* 카드 앞면 (백운중 X) */
        .card-front {
            background-color: #3b82f6;
            color: white;
            font-size: 16px;
        }
        
        /* 카드 뒷면 (문제/정답) */
        .card-back {
            background-color: white;
            color: #1f2937;
            transform: rotateY(180deg);
            border: 3px solid #3b82f6;
        }
        
        /* 짝을 맞췄을 때 (초록색) */
        .card.matched .card-back {
            background-color: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        /* 새 게임 버튼 */
        button {
            margin-top: 30px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover { background-color: #4338ca; }
    </style>
</head>
<body>

    <h1>백운중 이차방정식 카드 뒤집기 (24장)</h1>
    <div class="grid-container" id="game-board"></div>
    <button onclick="startGame()">새 게임 시작하기 (섞기)</button>

    <script>
        // 12쌍(24개)의 이차방정식과 해답
        const pairs = [
            { q: "x² - 1 = 0", a: "x = 1<br>또는<br>x = -1" },
            { q: "x² - 4 = 0", a: "x = 2<br>또는<br>x = -2" },
            { q: "x² - 9 = 0", a: "x = 3<br>또는<br>x = -3" },
            { q: "x² - 16 = 0", a: "x = 4<br>또는<br>x = -4" },
            { q: "x² - 25 = 0", a: "x = 5<br>또는<br>x = -5" },
            { q: "x² - 36 = 0", a: "x = 6<br>또는<br>x = -6" },
            { q: "x² - 3x + 2 = 0", a: "x = 1<br>또는<br>x = 2" },
            { q: "x² - 5x + 6 = 0", a: "x = 2<br>또는<br>x = 3" },
            { q: "x² - x - 6 = 0", a: "x = -2<br>또는<br>x = 3" },
            { q: "x² - 4x - 5 = 0", a: "x = -1<br>또는<br>x = 5" },
            { q: "x² - 7x + 10 = 0", a: "x = 2<br>또는<br>x = 5" },
            { q: "x² + 4x + 3 = 0", a: "x = -1<br>또는<br>x = -3" }
        ];

        let cards = [];
        let firstCard = null;
        let secondCard = null;
        let lockBoard = false;
        let matchCount = 0;

        function startGame() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            cards = [];
            matchCount = 0;
            
            // 짝꿍 데이터 만들기
            let idCounter = 0;
            pairs.forEach((pair, index) => {
                cards.push({ id: idCounter++, type: index, text: pair.q });
                cards.push({ id: idCounter++, type: index, text: pair.a });
            });

            // 카드 무작위로 섞기
            cards.sort(() => 0.5 - Math.random());

            // 카드 화면에 그리기
            cards.forEach((card, index) => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('card');
                cardElement.dataset.type = card.type;
                
                cardElement.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-front">백운중 ${index + 1}</div>
                        <div class="card-face card-back">${card.text}</div>
                    </div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                board.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flipped');

            if (!firstCard) {
                firstCard = this;
                return;
            }

            secondCard = this;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.type === secondCard.dataset.type;

            if (isMatch) {
                disableCards();
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            resetBoard();
            
            matchCount++;
            if (matchCount === 12) {
                setTimeout(() => alert("축하합니다! 모든 카드를 맞췄습니다!"), 500);
            }
        }

        function unflipCards() {
            lockBoard = true;
            // 틀렸을 때 다시 뒤집히는 시간 (1000 = 1초)
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [firstCard, secondCard, lockBoard] = [null, null, false];
        }

        // 페이지 열리자마자 바로 게임 시작
        window.onload = startGame;
    </script>
</body>
</html>
