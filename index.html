<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>백운중 이차방정식 카드 놀이</title>
    <!-- 꽃가루 효과를 위한 외부 라이브러리 불러오기 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #f3f4f6; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
            overflow-x: hidden;
        }
        h1 { color: #1f2937; font-size: 26px; margin-bottom: 20px; font-weight: 800; }
        
        #game-section { display: block; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
        }
        @media (min-width: 768px) {
            .grid-container { grid-template-columns: repeat(6, 1fr); max-width: 900px; }
        }

        .card {
            aspect-ratio: 1 / 1;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            width: 100%; height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-face {
            width: 100%; height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-weight: bold;
            padding: 8px;
            box-sizing: border-box;
            word-break: keep-all;
            text-align: center;
            line-height: 1.3;
        }
        
        /* 바깥면 스타일 */
        .card-front {
            color: #1f2937;
            font-size: 16px;
        }
        .card-front.question-front {
            background-color: #bae6fd;
            border: 2px solid #7dd3fc;
        }
        .card-front.answer-front {
            background-color: #fef08a;
            border: 2px solid #fde047;
        }

        /* 안쪽면 스타일 */
        .card-back {
            background-color: white;
            color: #1f2937;
            transform: rotateY(180deg);
            font-size: 20px;
            white-space: pre-line;
            border: 3px solid #3b82f6;
        }
        
        /* 짝을 맞췄을 때 */
        .card.matched .card-back {
            background-color: #10b981 !important;
            color: white !important;
            border-color: #10b981 !important;
        }

        /* === 축하 팝업 화면 스타일 === */
        #victory-overlay {
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            z-index: 9999; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: white;
        }
        .victory-title {
            font-size: 2.5rem; 
            color: #fbbf24; 
            margin-bottom: 20px; 
            text-shadow: 0 0 15px #f59e0b;
        }
        .victory-gif {
            width: 150px; 
            height: 150px; 
            image-rendering: pixelated; 
            margin-bottom: 30px; 
            border-radius: 10px;
        }

        /* 수정 화면 스타일 */
        #edit-section { 
            display: none; 
            max-width: 600px; 
            margin: 0 auto; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .edit-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .edit-row span { font-weight: bold; width: 40px; }
        .edit-row input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
        }

        /* 버튼 스타일 */
        .btn-group {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }
        .btn-primary { background-color: #4f46e5; }
        .btn-primary:hover { background-color: #4338ca; }
        .btn-secondary { background-color: #f59e0b; }
        .btn-secondary:hover { background-color: #d97706; }
        .btn-cancel { background-color: #6b7280; }
        .btn-cancel:hover { background-color: #4b5563; }
        .btn-save { background-color: #10b981; width: 100%; margin-top: 15px;}
        .btn-save:hover { background-color: #059669; }
        
        .info-text { font-size: 14px; color: #6b7280; margin-bottom: 20px; }

    </style>
</head>
<body>

    <!-- 축하 화면 오버레이 -->
    <div id="victory-overlay">
        <h1 class="victory-title">🎉 완벽하게 맞췄습니다! 🎉</h1>
        <!-- 귀여운 8비트 춤추는 캐릭터 GIF -->
        <img class="victory-gif" src="https://media.tenor.com/97y4tL_wWvMAAAAj/pixel-dance.gif" alt="춤추는 캐릭터">
        <button onclick="closeVictory()" style="background-color:#10b981; font-size:1.2rem; padding:15px 30px;">다시 게임하기</button>
    </div>

    <!-- 1. 게임 화면 -->
    <div id="game-section">
        <h1>백운중 이차방정식 카드 게임</h1>
        <div class="grid-container" id="game-board"></div>
        <div class="btn-group">
            <button class="btn-primary" onclick="startGame()">새 게임 시작 (섞기)</button>
            <button class="btn-secondary" onclick="openEditMode()">내 문제 직접 만들기 ✏️</button>
        </div>
    </div>

    <!-- 2. 문제 수정 화면 -->
    <div id="edit-section">
        <h1>문제 직접 만들기 (12쌍)</h1>
        <p class="info-text">식과 정답을 입력해보세요! 완료 후 게임이 바로 시작됩니다.</p>
        <div id="edit-list"></div>
        <button class="btn-save" onclick="saveAndStart()">✅ 저장하고 내 게임 시작하기</button>
        <button class="btn-cancel" onclick="closeEditMode()" style="margin-top: 10px; width: 100%;">취소</button>
    </div>

    <script>
        // === 효과음 및 8비트 음악 발생기 (Web Audio API) ===
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if (type === 'flip') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(300, now);
                oscillator.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                oscillator.start(now);
                oscillator.stop(now + 0.1);
            } 
            else if (type === 'match') {
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(523.25, now);
                oscillator.frequency.setValueAtTime(659.25, now + 0.1);
                oscillator.frequency.setValueAtTime(783.99, now + 0.2);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.3, now + 0.05);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
                oscillator.start(now);
                oscillator.stop(now + 0.4);
            } 
            else if (type === 'wrong') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, now);
                oscillator.frequency.linearRampToValueAtTime(100, now + 0.3);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.2, now + 0.05);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                oscillator.start(now);
                oscillator.stop(now + 0.3);
            }
        }

        // 🎵 고전 게임 스타일 8비트 승리 노래 재생 함수
        function playVictorySong() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // 승리의 아르페지오 음계
            const notes = [
                { f: 261.63, d: 0.12 }, // 도
                { f: 329.63, d: 0.12 }, // 미
                { f: 392.00, d: 0.12 }, // 솔
                { f: 523.25, d: 0.12 }, // 높은 도
                { f: 659.25, d: 0.12 }, // 높은 미
                { f: 783.99, d: 0.5  }  // 높은 솔 (길게)
            ];
            
            let time = audioCtx.currentTime;
            notes.forEach(n => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'square'; // 레트로 8비트 게임 소리
                osc.frequency.value = n.f;
                gain.gain.setValueAtTime(0.2, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + n.d);
                
                osc.start(time);
                osc.stop(time + n.d);
                time += n.d;
            });
        }

        // 🌸 양쪽에서 터지는 꽃가루 효과 함수
        function shootConfetti() {
            var duration = 3000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5, angle: 60, spread: 55, origin: { x: 0 },
                    colors: ['#3b82f6', '#10b981', '#fef08a', '#fde047', '#f43f5e']
                });
                confetti({
                    particleCount: 5, angle: 120, spread: 55, origin: { x: 1 },
                    colors: ['#3b82f6', '#10b981', '#fef08a', '#fde047', '#f43f5e']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // === 게임 로직 ===
        let currentPairs = [
            { q: "x² - 1 = 0", a: "x = 1\n또는\nx = -1" },
            { q: "x² - 4 = 0", a: "x = 2\n또는\nx = -2" },
            { q: "x² - 9 = 0", a: "x = 3\n또는\nx = -3" },
            { q: "x² - 16 = 0", a: "x = 4\n또는\nx = -4" },
            { q: "x² - 25 = 0", a: "x = 5\n또는\nx = -5" },
            { q: "x² - 36 = 0", a: "x = 6\n또는\nx = -6" },
            { q: "x² - 3x + 2 = 0", a: "x = 1\n또는\nx = 2" },
            { q: "x² - 5x + 6 = 0", a: "x = 2\n또는\nx = 3" },
            { q: "x² - x - 6 = 0", a: "x = -2\n또는\nx = 3" },
            { q: "x² - 4x - 5 = 0", a: "x = -1\n또는\nx = 5" },
            { q: "x² - 7x + 10 = 0", a: "x = 2\n또는\nx = 5" },
            { q: "x² + 4x + 3 = 0", a: "x = -1\n또는\nx = -3" }
        ];

        let cards = [];
        let firstCard = null;
        let secondCard = null;
        let lockBoard = false;
        let matchCount = 0;

        function startGame() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            cards = [];
            matchCount = 0;
            
            let idCounter = 0;
            currentPairs.forEach((pair, index) => {
                cards.push({ id: idCounter++, type: index, text: pair.q, cardType: 'question' });
                cards.push({ id: idCounter++, type: index, text: pair.a, cardType: 'answer' });
            });

            cards.sort(() => 0.5 - Math.random());

            cards.forEach((card, index) => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('card');
                cardElement.dataset.type = card.type;
                
                const frontClass = card.cardType === 'question' ? 'question-front' : 'answer-front';
                const frontText = card.cardType === 'question' ? `문제 ${index + 1}` : `정답 ${index + 1}`;

                cardElement.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-front ${frontClass}">${frontText}</div>
                        <div class="card-face card-back">${card.text}</div>
                    </div>
                `;
                
                cardElement.addEventListener('click', flipCard);
                board.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            playSound('flip');
            this.classList.add('flipped');

            if (!firstCard) {
                firstCard = this;
                return;
            }

            secondCard = this;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.type === secondCard.dataset.type;

            if (isMatch) {
                setTimeout(() => playSound('match'), 300);
                disableCards();
            } else {
                setTimeout(() => playSound('wrong'), 300);
                unflipCards();
            }
        }

        function disableCards() {
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            resetBoard();
            
            matchCount++;
            if (matchCount === 12) {
                // 모두 맞췄을 때 0.8초 뒤 축하 이벤트 실행!
                setTimeout(() => {
                    playVictorySong(); // 8비트 노래 재생
                    shootConfetti();   // 꽃가루 발사
                    document.getElementById('victory-overlay').style.display = 'flex'; // 축하 화면 표시
                }, 800);
            }
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [firstCard, secondCard, lockBoard] = [null, null, false];
        }

        // 축하 화면 닫고 새 게임
        function closeVictory() {
            document.getElementById('victory-overlay').style.display = 'none';
            startGame();
        }

        // === 문제 수정 관련 로직 ===
        function openEditMode() {
            document.getElementById('game-section').style.display = 'none';
            document.getElementById('edit-section').style.display = 'block';
            
            const editList = document.getElementById('edit-list');
            editList.innerHTML = '';
            
            currentPairs.forEach((pair, i) => {
                const row = document.createElement('div');
                row.classList.add('edit-row');
                let displayA = pair.a.replace(/\n/g, " ");
                
                row.innerHTML = `
                    <span>${i + 1}번</span>
                    <input type="text" id="edit-q-${i}" value="${pair.q}" placeholder="예: x² - 1 = 0 (문제)">
                    <input type="text" id="edit-a-${i}" value="${displayA}" placeholder="예: x = 1 또는 x = -1 (정답)">
                `;
                editList.appendChild(row);
            });
        }

        function closeEditMode() {
            document.getElementById('edit-section').style.display = 'none';
            document.getElementById('game-section').style.display = 'block';
        }

        function saveAndStart() {
            for (let i = 0; i < 12; i++) {
                let qVal = document.getElementById(`edit-q-${i}`).value;
                let aVal = document.getElementById(`edit-a-${i}`).value;
                
                if(aVal.includes('또는') && !aVal.includes('\n')) {
                    aVal = aVal.replace('또는', '\n또는\n');
                }

                currentPairs[i] = { q: qVal, a: aVal };
            }
            
            closeEditMode();
            startGame();
        }

        window.addEventListener('click', function initAudio() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            window.removeEventListener('click', initAudio);
        }, { once: true });

        window.onload = startGame;
    </script>
</body>
</html>
