<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>백운중 이차방정식 카드 놀이</title>
    <!-- 꽃가루 효과를 위한 외부 라이브러리 불러오기 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #f3f4f6; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
            overflow-x: hidden;
        }
        h1 { color: #1f2937; font-size: 26px; margin-bottom: 20px; font-weight: 800; }
        
        #game-section { display: block; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
        }
        @media (min-width: 768px) {
            .grid-container { grid-template-columns: repeat(6, 1fr); max-width: 900px; }
        }

        .card {
            aspect-ratio: 1 / 1;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            width: 100%; height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-face {
            width: 100%; height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-weight: bold;
            padding: 8px;
            box-sizing: border-box;
            word-break: keep-all;
            text-align: center;
            line-height: 1.3;
        }
        
        .card-front { color: #1f2937; font-size: 16px; }
        .card-front.question-front { background-color: #bae6fd; border: 2px solid #7dd3fc; }
        .card-front.answer-front { background-color: #fef08a; border: 2px solid #fde047; }

        .card-back {
            background-color: white; color: #1f2937;
            transform: rotateY(180deg); font-size: 20px;
            white-space: pre-line; border: 3px solid #3b82f6;
        }
        .card.matched .card-back {
            background-color: #10b981 !important; color: white !important; border-color: #10b981 !important;
        }

        /* === 축하 화면 & 8비트 사탕 룰렛 스타일 === */
        #victory-overlay {
            display: none; position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 9999; 
            flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        .victory-title { font-size: 2.5rem; color: #fbbf24; margin-bottom: 10px; text-shadow: 0 0 15px #f59e0b; }
        .victory-gif { width: 120px; height: 120px; image-rendering: pixelated; margin-bottom: 20px; border-radius: 10px; }

        /* 레트로 오락기 화면 스타일 (룰렛) */
        .retro-arcade {
            background-color: #222;
            border: 6px solid #aaa;
            border-style: outset;
            padding: 15px 30px;
            margin-bottom: 30px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
            font-family: 'Courier New', Courier, monospace; /* 레트로 느낌의 폰트 */
            min-width: 250px;
        }
        .retro-subtitle { color: #fff; font-size: 1rem; margin-bottom: 10px; }
        .roulette-display {
            font-size: 2.5rem;
            color: #39ff14; /* 네온 그린 */
            font-weight: 900;
            text-shadow: 0 0 10px #39ff14;
            margin: 10px 0;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .blink { animation: blinker 0.3s linear infinite; color: #fbbf24; text-shadow: 0 0 15px #fbbf24; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* 수정 화면 스타일 등 */
        #edit-section { 
            display: none; max-width: 600px; margin: 0 auto; background: white; 
            padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .edit-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .edit-row span { font-weight: bold; width: 40px; }
        .edit-row input { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #d1d5db; border-radius: 6px; }

        .btn-group { margin-top: 30px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: background-color 0.2s; }
        .btn-primary { background-color: #4f46e5; }
        .btn-primary:hover { background-color: #4338ca; }
        .btn-secondary { background-color: #f59e0b; }
        .btn-secondary:hover { background-color: #d97706; }
        .btn-cancel { background-color: #6b7280; }
        .btn-cancel:hover { background-color: #4b5563; }
        .btn-save { background-color: #10b981; width: 100%; margin-top: 15px;}
        .btn-save:hover { background-color: #059669; }
        .info-text { font-size: 14px; color: #6b7280; margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- 축하 화면 & 사탕 룰렛 오버레이 -->
    <div id="victory-overlay">
        <h1 class="victory-title">🎉 완벽하게 맞췄습니다! 🎉</h1>
        <img class="victory-gif" src="https://media.tenor.com/97y4tL_wWvMAAAAj/pixel-dance.gif" alt="춤추는 캐릭터">
        
        <!-- 8비트 사탕 룰렛 기계 -->
        <div class="retro-arcade">
            <div class="retro-subtitle" id="roulette-msg">오늘의 보상 사탕 맛은?</div>
            <div class="roulette-display" id="roulette-display">???</div>
        </div>

        <button onclick="closeVictory()" style="background-color:#10b981; font-size:1.2rem; padding:15px 30px;">다시 게임하기</button>
    </div>

    <!-- 1. 게임 화면 -->
    <div id="game-section">
        <h1>백운중 이차방정식 카드 게임</h1>
        <div class="grid-container" id="game-board"></div>
        <div class="btn-group">
            <button class="btn-primary" onclick="startGame()">새 게임 시작 (섞기)</button>
            <button class="btn-secondary" onclick="openEditMode()">내 문제 직접 만들기 ✏️</button>
        </div>
    </div>

    <!-- 2. 문제 수정 화면 -->
    <div id="edit-section">
        <h1>문제 직접 만들기 (12쌍)</h1>
        <p class="info-text">식과 정답을 입력해보세요! 완료 후 게임이 바로 시작됩니다.</p>
        <div id="edit-list"></div>
        <button class="btn-save" onclick="saveAndStart()">✅ 저장하고 내 게임 시작하기</button>
        <button class="btn-cancel" onclick="closeEditMode()" style="margin-top: 10px; width: 100%;">취소</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'flip') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(300, now);
                oscillator.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                gainNode.gain.setValueAtTime(0.5, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                oscillator.start(now); oscillator.stop(now + 0.1);
            } else if (type === 'match') {
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(523.25, now);
                oscillator.frequency.setValueAtTime(659.25, now + 0.1);
                oscillator.frequency.setValueAtTime(783.99, now + 0.2);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.3, now + 0.05);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
                oscillator.start(now); oscillator.stop(now + 0.4);
            } else if (type === 'wrong') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, now);
                oscillator.frequency.linearRampToValueAtTime(100, now + 0.3);
                gainNode.gain.setValueAtTime(0, now);
                gainNode.gain.linearRampToValueAtTime(0.2, now + 0.05);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
                oscillator.start(now); oscillator.stop(now + 0.3);
            } else if (type === 'tick') {
                // 룰렛 돌아가는 또르르륵 소리
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(800, now);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                oscillator.start(now); oscillator.stop(now + 0.05);
            } else if (type === 'tada') {
                // 룰렛 당첨 빰빠밤 소리
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(523.25, now); // 도
                oscillator.frequency.setValueAtTime(659.25, now + 0.1); // 미
                oscillator.frequency.setValueAtTime(783.99, now + 0.2); // 솔
                oscillator.frequency.setValueAtTime(1046.50, now + 0.3); // 높은 도
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.8);
                oscillator.start(now); oscillator.stop(now + 0.8);
            }
        }

        // 🎵 더 길어진! 고전 게임 스타일 승리 노래
        function playVictorySong() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // 승리를 향해 올라가는 길고 신나는 8비트 멜로디
            const notes = [
                { f: 392.00, d: 0.15 }, { f: 523.25, d: 0.15 }, { f: 659.25, d: 0.15 }, { f: 783.99, d: 0.3 }, 
                { f: 659.25, d: 0.15 }, { f: 783.99, d: 0.3 },
                { f: 329.63, d: 0.15 }, { f: 440.00, d: 0.15 }, { f: 523.25, d: 0.15 }, { f: 659.25, d: 0.3 }, 
                { f: 523.25, d: 0.15 }, { f: 659.25, d: 0.3 },
                { f: 392.00, d: 0.15 }, { f: 493.88, d: 0.15 }, { f: 587.33, d: 0.15 }, { f: 783.99, d: 0.3 }, 
                { f: 783.99, d: 0.15 }, { f: 880.00, d: 0.15 }, { f: 987.77, d: 0.15 }, { f: 1046.50, d: 0.8 } 
            ];
            
            let time = audioCtx.currentTime;
            notes.forEach(n => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'square'; 
                osc.frequency.value = n.f;
                gain.gain.setValueAtTime(0.15, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + n.d);
                osc.start(time); osc.stop(time + n.d);
                time += n.d;
            });
        }

        function shootConfetti() {
            var duration = 4000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#3b82f6', '#10b981', '#fef08a', '#fde047', '#f43f5e'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#3b82f6', '#10b981', '#fef08a', '#fde047', '#f43f5e'] });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        // 🎰 사탕 룰렛 로직
        const candyFlavors = ['🍫 초코', '🍓 딸기', '🥛 딸기우유', '🍋 라임', '🍇 포도', '🥤 콜라', '🍊 오렌지'];
        
        function startRoulette() {
            const display = document.getElementById('roulette-display');
            const msg = document.getElementById('roulette-msg');
            display.classList.remove('blink');
            msg.innerText = "룰렛이 돌아갑니다...!";
            
            let ticks = 0;
            const maxTicks = 45; // 총 돌아가는 횟수 (서서히 느려짐)
            let speed = 50; // 초기 속도 (빠름)

            function spin() {
                const randomFlavor = candyFlavors[Math.floor(Math.random() * candyFlavors.length)];
                display.innerText = randomFlavor;
                playSound('tick'); // 또르륵 소리

                ticks++;
                if (ticks < maxTicks) {
                    // 뒤로 갈수록 속도가 느려짐
                    if (ticks > maxTicks * 0.6) speed += 15;
                    setTimeout(spin, speed);
                } else {
                    // 룰렛 정지 및 당첨!
                    playSound('tada');
                    msg.innerText = "당첨!! 선생님께 달라고 하세요! 🎉";
                    display.classList.add('blink'); // 네온 깜빡임 효과
                }
            }
            setTimeout(spin, speed);
        }

        // === 게임 로직 ===
        let currentPairs = [
            { q: "x² - 1 = 0", a: "x = 1\n또는\nx = -1" }, { q: "x² - 4 = 0", a: "x = 2\n또는\nx = -2" },
            { q: "x² - 9 = 0", a: "x = 3\n또는\nx = -3" }, { q: "x² - 16 = 0", a: "x = 4\n또는\nx = -4" },
            { q: "x² - 25 = 0", a: "x = 5\n또는\nx = -5" }, { q: "x² - 36 = 0", a: "x = 6\n또는\nx = -6" },
            { q: "x² - 3x + 2 = 0", a: "x = 1\n또는\nx = 2" }, { q: "x² - 5x + 6 = 0", a: "x = 2\n또는\nx = 3" },
            { q: "x² - x - 6 = 0", a: "x = -2\n또는\nx = 3" }, { q: "x² - 4x - 5 = 0", a: "x = -1\n또는\nx = 5" },
            { q: "x² - 7x + 10 = 0", a: "x = 2\n또는\nx = 5" }, { q: "x² + 4x + 3 = 0", a: "x = -1\n또는\nx = -3" }
        ];

        let cards = []; let firstCard = null; let secondCard = null; let lockBoard = false; let matchCount = 0;

        function startGame() {
            const board = document.getElementById('game-board'); board.innerHTML = '';
            cards = []; matchCount = 0;
            
            let idCounter = 0;
            currentPairs.forEach((pair, index) => {
                cards.push({ id: idCounter++, type: index, text: pair.q, cardType: 'question' });
                cards.push({ id: idCounter++, type: index, text: pair.a, cardType: 'answer' });
            });

            cards.sort(() => 0.5 - Math.random());

            cards.forEach((card, index) => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('card'); cardElement.dataset.type = card.type;
                
                const frontClass = card.cardType === 'question' ? 'question-front' : 'answer-front';
                const frontText = card.cardType === 'question' ? `문제 ${index + 1}` : `정답 ${index + 1}`;

                cardElement.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-front ${frontClass}">${frontText}</div>
                        <div class="card-face card-back">${card.text}</div>
                    </div>
                `;
                cardElement.addEventListener('click', flipCard);
                board.appendChild(cardElement);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            playSound('flip'); this.classList.add('flipped');

            if (!firstCard) { firstCard = this; return; }
            secondCard = this; checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.type === secondCard.dataset.type;
            if (isMatch) {
                setTimeout(() => playSound('match'), 300); disableCards();
            } else {
                setTimeout(() => playSound('wrong'), 300); unflipCards();
            }
        }

        function disableCards() {
            firstCard.classList.add('matched'); secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard); secondCard.removeEventListener('click', flipCard);
            resetBoard(); matchCount++;
            
            if (matchCount === 12) {
                // 게임 클리어 이벤트!
                setTimeout(() => {
                    document.getElementById('victory-overlay').style.display = 'flex';
                    playVictorySong(); 
                    shootConfetti();   
                    startRoulette(); // 사탕 룰렛 시작!
                }, 800);
            }
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flipped'); secondCard.classList.remove('flipped');
                resetBoard();
            }, 1000);
        }

        function resetBoard() { [firstCard, secondCard, lockBoard] = [null, null, false]; }

        function closeVictory() {
            document.getElementById('victory-overlay').style.display = 'none';
            document.getElementById('roulette-display').innerText = "???"; // 룰렛 초기화
            startGame();
        }

        // 수정 기능 로직
        function openEditMode() {
            document.getElementById('game-section').style.display = 'none'; document.getElementById('edit-section').style.display = 'block';
            const editList = document.getElementById('edit-list'); editList.innerHTML = '';
            currentPairs.forEach((pair, i) => {
                const row = document.createElement('div'); row.classList.add('edit-row');
                let displayA = pair.a.replace(/\n/g, " ");
                row.innerHTML = `<span>${i + 1}번</span><input type="text" id="edit-q-${i}" value="${pair.q}" placeholder="문제"><input type="text" id="edit-a-${i}" value="${displayA}" placeholder="정답">`;
                editList.appendChild(row);
            });
        }

        function closeEditMode() {
            document.getElementById('edit-section').style.display = 'none'; document.getElementById('game-section').style.display = 'block';
        }

        function saveAndStart() {
            for (let i = 0; i < 12; i++) {
                let qVal = document.getElementById(`edit-q-${i}`).value; let aVal = document.getElementById(`edit-a-${i}`).value;
                if(aVal.includes('또는') && !aVal.includes('\n')) { aVal = aVal.replace('또는', '\n또는\n'); }
                currentPairs[i] = { q: qVal, a: aVal };
            }
            closeEditMode(); startGame();
        }

        window.addEventListener('click', function initAudio() {
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
            window.removeEventListener('click', initAudio);
        }, { once: true });

        window.onload = startGame;
    </script>
</body>
</html>
