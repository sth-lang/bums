<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>백운중 이차방정식 카드 놀이</title>
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #f3f4f6; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        h1 { color: #1f2937; font-size: 26px; margin-bottom: 20px; font-weight: 800; }
        
        /* === 게임 화면 스타일 === */
        #game-section { display: block; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
        }
        @media (min-width: 768px) {
            .grid-container { grid-template-columns: repeat(6, 1fr); max-width: 900px; }
        }

        .card {
            aspect-ratio: 1 / 1;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            width: 100%; height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-face {
            width: 100%; height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-weight: bold;
            padding: 8px;
            box-sizing: border-box;
            word-break: keep-all;
            text-align: center;
            line-height: 1.3;
        }
        
        /* 카드 앞면 (백운중 X) */
        .card-front {
            background-color: #3b82f6;
            color: white;
            font-size: 18px;
        }
        
        /* 공통 카드 뒷면 스타일 */
        .card-back {
            color: #1f2937;
            transform: rotateY(180deg);
            font-size: 20px;
            white-space: pre-line;
        }

        /* 🟦 문제 카드 (하늘색) */
        .card-back.question {
            background-color: #bae6fd; 
            border: 3px solid #38bdf8;
        }

        /* 🟨 정답 카드 (노란색) */
        .card-back.answer {
            background-color: #fef08a; 
            border: 3px solid #eab308;
        }
        
        /* 🟩 짝을 맞췄을 때 (초록색) - 우선순위 적용 */
        .card.matched .card-back.question,
        .card.matched .card-back.answer {
            background-color: #10b981 !important;
            color: white !important;
            border-color: #10b981 !important;
        }

        /* === 문제 수정 화면 스타일 === */
        #edit-section { 
            display: none; 
            max-width: 600px; 
            margin: 0 auto; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .edit-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .edit-row span { font-weight: bold; width: 40px; }
        .edit-row input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
        }

        /* 버튼 스타일 */
        .btn-group {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }
        .btn-primary { background-color: #4f46e5; }
        .btn-primary:hover { background-color: #4338ca; }
        .btn-secondary { background-color: #f59e0b; }
        .btn-secondary:hover { background-color: #d97706; }
