<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>백운중 기밀 금고 해독 작전</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #f3f4f6; 
            text-align: center; padding: 0; margin: 0;
            overflow: hidden;
        }
        
        /* === 1. 철제 금고문 === */
        #vault-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9000; display: flex; pointer-events: none;
        }
        .door {
            width: 50%; height: 100%;
            background: linear-gradient(to right, #93c5fd, #60a5fa);
            border: 10px solid #dbeafe;
            box-sizing: border-box; position: relative;
            transition: transform 1.8s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }
        .door::before {
            content: ''; position: absolute; top: 20px; bottom: 20px;
            width: 20px; border-left: 6px dotted #0f172a; opacity: 0.5;
        }
        .door.left { transform: translateX(0); border-right: 5px solid #000; }
        .door.left::before { left: 20px; }
        .door.right { transform: translateX(0); border-left: 5px solid #000; }
        .door.right::before { right: 20px; }
        .door.left.open { transform: translateX(-100%); }
        .door.right.open { transform: translateX(100%); }

        /* === 2. 중앙 다이얼 (시작 버튼) === */
        #front-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9500;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            pointer-events: none;
        }
        #front-controls.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.4s ease, visibility 0s linear 0.4s;
        }
        #front-controls.hidden #center-dial,
        #front-controls.hidden #front-edit-btn {
            pointer-events: none !important;
        }
        #center-dial {
            position: relative;
            width: 200px; height: 200px;
            background: radial-gradient(circle at 30% 30%, #fff7cc 0%, #facc15 45%, #dc2626 100%);
            border: 12px solid #dbeafe;
            border-radius: 50%; z-index: 9500;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; pointer-events: auto;
            box-shadow: 0 0 25px rgba(250,204,21,0.9), 0 0 50px rgba(220,38,38,0.7), inset 0 5px 15px rgba(255,255,255,0.8);
            transition: transform 1.5s ease-in-out, opacity 1s;
        }
        #center-dial:hover { filter: brightness(1.15); }
        .dial-text { font-size: 1.5rem; font-weight: 900; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); margin-bottom: 5px; }
        .dial-sub { font-size: 1rem; color: #ffffff; font-weight: bold; text-shadow:0 0 10px rgba(255,255,255,0.9); }
        #center-dial.unlocking { transform: rotate(720deg) scale(0.3); opacity: 0; pointer-events: none; }
        #front-edit-btn {
            pointer-events: auto;
            padding: 12px 22px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #92400e;
            font-size: 17px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(146, 64, 14, 0.25);
            border: 3px solid rgba(251, 191, 36, 0.75);
        }
        #front-edit-btn:hover { filter: brightness(1.05); transform: translateY(-1px); }

        /* === 3. 게임 화면 === */
        #game-section { position: absolute; top:0; left:0; width:100%; height:100%; overflow-y: auto; padding: 20px; box-sizing: border-box; display: none; }
        h1.game-title { color: #1f2937; font-size: 26px; margin-bottom: 20px; font-weight: 800; }
        .play-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 138px;
            gap: 10px;
            width: min(1120px, calc(100vw - 32px));
            margin: 0 auto;
            align-items: stretch;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 10px;
            width: 100%;
            margin: 0;
        }
        @media (min-width: 768px) { .grid-container { grid-template-columns: repeat(6, minmax(0, 1fr)); } }
        .card { aspect-ratio: 1 / 1; perspective: 1000px; cursor: pointer; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-face {
            width: 100%; height: 100%; position: absolute; backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-weight: bold; padding: 8px; box-sizing: border-box; word-break: keep-all; text-align: center; line-height: 1.3;
        }
        .card-front { color: #1f2937; font-size: 16px; }
        .card-front.question-front { background-color: #dbeafe; border: 2px solid #93c5fd; }
        .card-front.answer-front { background-color: #fef9c3; border: 2px solid #facc15; }
        .card-back { background-color: #ffffff; color: #1f2937; transform: rotateY(180deg); font-size: 20px; white-space: pre-line; border: 3px solid #93c5fd; box-shadow: 0 0 12px rgba(147,197,253,0.45); }
        .card.matched .card-back { background-color: #10b981 !important; color: white !important; border-color: #10b981 !important; }

        /* === 4. CSS로 직접 그린 보물창고 배경 === */
        #treasure-room {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at center, #fde047 0%, #ca8a04 40%, #78350f 80%, #451a03 100%);
            z-index: 8000; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }
        /* 보물 아이콘들 (CSS로 흩뿌리기) */
        .treasure-bg-item {
            position: absolute; font-size: 3rem; opacity: 0.7;
            animation: sparkle 3s ease-in-out infinite alternate;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
            pointer-events: none;
        }
        @keyframes sparkle { 
            from { transform: scale(1) rotate(-5deg); opacity: 0.6; }
            to { transform: scale(1.2) rotate(5deg); opacity: 1; }
        }
        /* 8개 보물 위치 지정 */
        .t1 { top: 8%; left: 8%; animation-delay: 0s; }
        .t2 { top: 12%; right: 10%; animation-delay: 0.5s; }
        .t3 { bottom: 15%; left: 12%; animation-delay: 1s; }
        .t4 { bottom: 10%; right: 8%; animation-delay: 1.5s; }
        .t5 { top: 45%; left: 5%; animation-delay: 0.3s; }
        .t6 { top: 50%; right: 5%; animation-delay: 0.8s; }
        .t7 { top: 25%; left: 30%; animation-delay: 1.2s; font-size: 2.5rem; }
        .t8 { bottom: 25%; right: 28%; animation-delay: 1.7s; font-size: 2.5rem; }

        .treasure-content { 
            position: relative; z-index: 5;
            display: flex; flex-direction: column; align-items: center;
            background: rgba(0,0,0,0.4); padding: 30px 50px; border-radius: 20px;
            backdrop-filter: blur(3px); border: 3px solid rgba(255, 215, 0, 0.6);
        }
        .treasure-icon { font-size: 5rem; margin-bottom: 0px; animation: bounce 2s infinite; text-shadow: 0 0 30px gold; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .victory-title { font-size: 3rem; color: #fff; margin: 10px 0; text-shadow: 0 0 20px #fbbf24, 0 0 40px #f59e0b; font-weight: 900; }
        
        /* 원판 룰렛 기계 */
        .retro-arcade {
            background-color: rgba(17, 24, 39, 0.95); border: 6px solid #fbbf24; padding: 20px 30px 26px;
            margin: 20px 0; border-radius: 18px; box-shadow: 0 0 40px rgba(251, 191, 36, 0.8);
            min-width: 470px; text-align: center;
        }
        .retro-subtitle { color: #f8fafc; font-size: 1.2rem; margin-bottom: 15px; font-weight: bold; }
        .wheel-wrap { position: relative; width: 360px; height: 360px; margin: 10px auto 18px; }
        .wheel-pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%); z-index: 4;
            width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 34px solid #ef4444;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.45));
        }
        #roulette-wheel {
            position: absolute; inset: 0; border-radius: 50%; border: 9px solid #fde68a;
            background: conic-gradient(
                #fef3c7 0deg 60deg,
                #fde68a 60deg 120deg,
                #fef3c7 120deg 180deg,
                #fde68a 180deg 240deg,
                #bfdbfe 240deg 300deg,
                #bbf7d0 300deg 360deg
            );
            box-shadow: 0 0 22px rgba(251, 191, 36, 0.75), inset 0 0 18px rgba(0,0,0,0.28);
            transition: transform 5s cubic-bezier(0.12, 0.75, 0.18, 1);
        }
        #roulette-wheel::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 56px; height: 56px; border-radius: 50%; background: #111827; border: 6px solid #fbbf24;
            box-shadow: 0 0 12px rgba(0,0,0,0.5);
        }
        .wheel-label {
            position: absolute; top: 50%; left: 50%; width: 110px; margin-left: -55px; margin-top: -18px;
            font-size: 21px; font-weight: 900; color: #111827; text-align: center; line-height: 1.1;
            text-shadow: 0 1px 0 rgba(255,255,255,0.75); z-index: 2; pointer-events: none;
        }
        .wheel-label.s0 { transform: rotate(30deg) translateY(-132px) rotate(-30deg); }
        .wheel-label.s1 { transform: rotate(90deg) translateY(-132px) rotate(-90deg); }
        .wheel-label.s2 { transform: rotate(150deg) translateY(-132px) rotate(-150deg); }
        .wheel-label.s3 { transform: rotate(210deg) translateY(-132px) rotate(-210deg); }
        .wheel-label.s4 { transform: rotate(270deg) translateY(-132px) rotate(-270deg); }
        .wheel-label.s5 { transform: rotate(330deg) translateY(-132px) rotate(-330deg); font-size: 17px; }
        .roulette-display { font-size: 2.4rem; color: #39ff14; font-weight: 900; text-shadow: 0 0 20px #39ff14; margin: 8px 0 0; min-height: 58px; }
        .blink { animation: blinker 0.3s linear infinite; color: #fbbf24; text-shadow: 0 0 20px #fbbf24; }
        @keyframes blinker { 50% { opacity: 0.3; } }


        @media (max-width: 600px) {
            .retro-arcade { min-width: 300px; padding: 16px 14px 22px; }
            .wheel-wrap { width: 300px; height: 300px; }
            .wheel-label { width: 96px; margin-left: -48px; font-size: 17px; }
            .wheel-label.s0 { transform: rotate(30deg) translateY(-110px) rotate(-30deg); }
            .wheel-label.s1 { transform: rotate(90deg) translateY(-110px) rotate(-90deg); }
            .wheel-label.s2 { transform: rotate(150deg) translateY(-110px) rotate(-150deg); }
            .wheel-label.s3 { transform: rotate(210deg) translateY(-110px) rotate(-210deg); }
            .wheel-label.s4 { transform: rotate(270deg) translateY(-110px) rotate(-270deg); }
            .wheel-label.s5 { transform: rotate(330deg) translateY(-110px) rotate(-330deg); font-size: 14px; }
        }

        /* 버튼 */
        .btn-group { margin-top: 30px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; padding-bottom: 50px; }
        button.action-btn { padding: 12px 24px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: 0.2s; }
        .btn-primary { background-color: #4f46e5; }
        .btn-secondary { background-color: #f59e0b; }



        /* === 5. 모둠 점수판 === */
        .score-panel {
            width: 138px;
            min-width: 138px;
            max-width: 138px;
            box-sizing: border-box;
            background: rgba(255,255,255,0.96);
            border: 3px solid #1f2937;
            border-radius: 16px;
            padding: 8px 6px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.16);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-self: stretch;
            overflow: hidden;
        }
        .score-title {
            font-weight: 900;
            color: #111827;
            font-size: 13px;
            margin-bottom: 5px;
            line-height: 1.1;
        }
        .team-score-grid {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            justify-content: space-evenly;
        }
        .team-score-card {
            background: linear-gradient(180deg, #fef3c7, #fde68a);
            border: 2px solid #f59e0b;
            border-radius: 10px;
            padding: 5px 4px;
            color: #78350f;
            font-weight: 900;
            font-size: 12px;
            box-sizing: border-box;
        }
        .team-score-value {
            font-size: 16px;
            margin: 0 0 3px;
            color: #111827;
        }
        .score-mini-buttons {
            display: flex;
            justify-content: center;
            gap: 6px;
        }
        .score-btn {
            border: none;
            border-radius: 9px;
            padding: 8px 10px;
            font-weight: 900;
            cursor: pointer;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.22);
            font-size: 15px;
            min-width: 44px;
        }
        .score-plus { background: #16a34a; }
        .score-minus { background: #64748b; }
        .score-reset {
            margin-top: 5px;
            background: #ef4444;
            color: #ffffff;
            border: none;
            border-radius: 999px;
            padding: 6px 6px;
            font-weight: 900;
            cursor: pointer;
            font-size: 11px;
        }
        #partner-team-display {
            min-height: 28px;
            font-size: 1.35rem;
            color: #fef3c7;
            font-weight: 900;
            text-shadow: 0 0 14px rgba(251, 191, 36, 0.85);
            margin-top: 8px;
        }
        .partner-pick-btn {
            margin-top: 8px;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 999px;
            padding: 9px 16px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.28);
        }
        @media (max-width: 768px) {
            .play-layout {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 96vw;
            }
            .grid-container {
                width: 100%;
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
            .score-panel {
                width: min(520px, 94vw);
                min-width: 0;
                max-width: none;
                align-self: center;
            }
            .team-score-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* 수정 화면 */
        #edit-section { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: #f3f4f6; overflow-y: auto; padding: 20px; z-index: 8500; box-sizing: border-box; }
        .edit-container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .edit-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .edit-row span { font-weight: bold; width: 40px; }
        .edit-row input { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #d1d5db; border-radius: 6px; }
        .math-toolbar {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
            background: #eef2ff; border: 2px solid #c7d2fe; border-radius: 12px;
            padding: 12px; margin: 12px 0 18px;
            position: sticky; top: 0; z-index: 5;
        }
        .math-toolbar-title { width: 100%; font-weight: 900; color: #3730a3; margin-bottom: 4px; }
        .math-symbol-btn {
            padding: 9px 13px; border: none; border-radius: 10px;
            background: white; color: #1f2937; font-size: 18px; font-weight: 900;
            cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.14);
            border: 1px solid #c7d2fe;
        }
        .math-symbol-btn:hover { background: #dbeafe; transform: translateY(-1px); }
        .math-helper-text { width: 100%; font-size: 17px; color: #6b7280; margin-top: 2px; }
        .btn-save { background-color: #10b981; width: 100%; margin-top: 15px;}
        .btn-cancel { background-color: #6b7280; width: 100%; margin-top: 10px;}
    </style>
</head>
<body>

    <div id="vault-container">
        <div class="door left" id="door-left"></div>
        <div class="door right" id="door-right"></div>
    </div>

    <div id="front-controls">
        <div id="center-dial" onclick="startVaultSequence()">
            <span class="dial-text" style="font-size:1.25rem; text-align:center; line-height:1.3;">백운중<br>이차방정식<br>금고 열기</span>
            <span class="dial-sub">▶ 게임 시작</span>
        </div>
        <button id="front-edit-btn" onclick="openFrontEditMode()">✏️ 암호 바꾸기</button>
    </div>

    <!-- 💎 보물창고: 코드로 직접 그린 화려한 배경 -->
    <div id="treasure-room">
        <!-- 흩뿌려진 보물 아이콘들 -->
        <div class="treasure-bg-item t1">💎</div>
        <div class="treasure-bg-item t2">👑</div>
        <div class="treasure-bg-item t3">💰</div>
        <div class="treasure-bg-item t4">🏆</div>
        <div class="treasure-bg-item t5">💍</div>
        <div class="treasure-bg-item t6">🪙</div>
        <div class="treasure-bg-item t7">✨</div>
        <div class="treasure-bg-item t8">⭐</div>
        
        <div class="treasure-content">
            <div class="treasure-icon">💎👑💰</div>
            <h1 class="victory-title">보물창고 개방 성공!</h1>
            
            <div class="retro-arcade">
                <div class="retro-subtitle" id="roulette-msg">🎰 오늘의 사탕 배수 보상은?</div>
                <div class="wheel-wrap">
                    <div class="wheel-pointer"></div>
                    <div id="roulette-wheel">
                        <span class="wheel-label s0">🍬<br>1배</span>
                        <span class="wheel-label s1">🍬<br>1배</span>
                        <span class="wheel-label s2">🍬<br>1배</span>
                        <span class="wheel-label s3">🍬<br>1배</span>
                        <span class="wheel-label s4">🍭<br>2배</span>
                        <span class="wheel-label s5">🤝<br>다른 조도<br>함께</span>
                    </div>
                </div>
                <div class="roulette-display" id="roulette-display">READY</div>
                <div id="partner-team-display"></div>
                <button class="partner-pick-btn" type="button" onclick="pickPartnerTeam(true)">🤝 함께 받을 조 뽑기</button>
            </div>

            <button class="action-btn" style="background-color:#10b981; font-size:1.2rem; padding:15px 40px;" onclick="resetToBeginning()">다시 금고 잠그기</button>
        </div>
    </div>

    <div id="game-section">
        <h1 class="game-title">🔐 이차방정식 금고 해독 (듀얼 키 매칭)</h1>
        <div class="play-layout">
            <div class="grid-container" id="game-board"></div>
            <div class="score-panel">
                <div class="score-title">🏆 모둠 점수판</div>
                <div class="team-score-grid" id="team-score-grid"></div>
                <button class="score-reset" type="button" onclick="resetTeamScores()">초기화</button>
            </div>
        </div>
        <div class="btn-group">
            <button class="action-btn btn-primary" onclick="shuffleAgain()">새 게임 (섞기)</button>
            <button class="action-btn btn-secondary" onclick="openEditMode()">새로운 암호 설계하기 ✏️</button>
        </div>
    </div>

    <div id="edit-section">
        <div class="edit-container">
            <h1 class="game-title">함정 암호 설계 (12쌍)</h1>
            <p style="color:#6b7280; font-size:14px; margin-bottom:20px;">암호를 만들고 기밀 금고를 새롭게 잠그세요.</p>
            <div class="math-toolbar" aria-label="수학 기호 입력 도구">
                <div class="math-toolbar-title">수학 기호 빠른 입력</div>
                <button type="button" class="math-symbol-btn" onclick="insertSymbol('√')">√</button>
                <button type="button" class="math-symbol-btn" onclick="insertSymbol('±')">±</button>
                <button type="button" class="math-symbol-btn" onclick="insertFraction()">분수</button>
                <button type="button" class="math-symbol-btn" onclick="insertSymbol('/')">/</button>
                <button type="button" class="math-symbol-btn" onclick="insertSymbol('²')">x²</button>
                <button type="button" class="math-symbol-btn" onclick="insertSymbol('x')">x</button>
                <button type="button" class="math-symbol-btn" onclick="insertSymbol('(')">(</button>
                <button type="button" class="math-symbol-btn" onclick="insertSymbol(')')">)</button>
                <button type="button" class="math-symbol-btn" onclick="insertSymbol(' + ')">+</button>
                <button type="button" class="math-symbol-btn" onclick="insertSymbol(' - ')">−</button>
                <button type="button" class="math-symbol-btn" onclick="insertSymbol(' = ')">=</button>
                <button type="button" class="math-symbol-btn" onclick="insertSymbol('또는')">또는</button>
                <button type="button" class="math-symbol-btn" onclick="insertSymbol('x = ')">x =</button>
                <div class="math-helper-text">입력칸을 누른 뒤 기호를 선택하세요. 예: x = 1 ± √2, x = 1/2</div>
            </div>
            <div id="edit-list"></div>
            <button class="action-btn btn-save" onclick="saveAndStart()">✅ 암호 저장 & 금고 잠그기</button>
            <button class="action-btn btn-cancel" onclick="closeEditMode()">취소</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // === 🎵 현실적인 금고 사운드 시스템 ===
        
        // 노이즈 버퍼 생성 (기계 소리에 사용)
        function createNoiseBuffer(duration) {
            const bufferSize = audioCtx.sampleRate * duration;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }
            return buffer;
        }

        // 🔐 진짜같은 금고 열리는 소리 (3단 합성)
        function playVaultOpenSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            
            // 1단계: 딸깍! 잠금장치 풀리는 금속 소리
            const click = audioCtx.createOscillator();
            const clickGain = audioCtx.createGain();
            click.connect(clickGain); clickGain.connect(audioCtx.destination);
            click.type = 'square';
            click.frequency.setValueAtTime(1200, now);
            click.frequency.exponentialRampToValueAtTime(400, now + 0.08);
            clickGain.gain.setValueAtTime(0.3, now);
            clickGain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            click.start(now); click.stop(now + 0.1);

            // 2단계: 위이잉~ 기어가 돌아가는 기계 소리 (노이즈+저주파)
            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = createNoiseBuffer(1.5);
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            noiseFilter.frequency.setValueAtTime(200, now + 0.2);
            noiseFilter.frequency.linearRampToValueAtTime(150, now + 1.5);
            noiseFilter.Q.value = 5;
            const noiseGain = audioCtx.createGain();
            noiseSource.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
            noiseGain.gain.setValueAtTime(0, now + 0.2);
            noiseGain.gain.linearRampToValueAtTime(0.4, now + 0.4);
            noiseGain.gain.linearRampToValueAtTime(0.3, now + 1.3);
            noiseGain.gain.linearRampToValueAtTime(0, now + 1.6);
            noiseSource.start(now + 0.2); noiseSource.stop(now + 1.6);
            
            // 3단계: 쿠궁~ 묵직한 문이 움직이는 저음 럼블
            const rumble = audioCtx.createOscillator();
            const rumbleGain = audioCtx.createGain();
            rumble.connect(rumbleGain); rumbleGain.connect(audioCtx.destination);
            rumble.type = 'sine';
            rumble.frequency.setValueAtTime(50, now + 0.3);
            rumble.frequency.linearRampToValueAtTime(35, now + 1.8);
            rumbleGain.gain.setValueAtTime(0, now + 0.3);
            rumbleGain.gain.linearRampToValueAtTime(0.6, now + 0.6);
            rumbleGain.gain.linearRampToValueAtTime(0.4, now + 1.5);
            rumbleGain.gain.linearRampToValueAtTime(0, now + 1.9);
            rumble.start(now + 0.3); rumble.stop(now + 1.9);
        }

        // 🔒 금고 닫히는 소리 (쿠궁! 쾅!)
        function playVaultCloseSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            
            // 1단계: 묵직하게 움직이는 럼블
            const rumble = audioCtx.createOscillator();
            const rumbleGain = audioCtx.createGain();
            rumble.connect(rumbleGain); rumbleGain.connect(audioCtx.destination);
            rumble.type = 'sine';
            rumble.frequency.setValueAtTime(45, now);
            rumble.frequency.linearRampToValueAtTime(30, now + 1.2);
            rumbleGain.gain.setValueAtTime(0.5, now);
            rumbleGain.gain.linearRampToValueAtTime(0.3, now + 1.2);
            rumbleGain.gain.linearRampToValueAtTime(0, now + 1.4);
            rumble.start(now); rumble.stop(now + 1.4);
            
            // 2단계: 쾅! 닫힐 때 강한 충격음 (1.2초 뒤)
            const slam = audioCtx.createOscillator();
            const slamGain = audioCtx.createGain();
            slam.connect(slamGain); slamGain.connect(audioCtx.destination);
            slam.type = 'square';
            slam.frequency.setValueAtTime(80, now + 1.2);
            slam.frequency.exponentialRampToValueAtTime(20, now + 1.5);
            slamGain.gain.setValueAtTime(0.9, now + 1.2);
            slamGain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
            slam.start(now + 1.2); slam.stop(now + 1.5);
            
            // 3단계: 철컥! 잠금 걸리는 금속 소리
            const lock = audioCtx.createOscillator();
            const lockGain = audioCtx.createGain();
            lock.connect(lockGain); lockGain.connect(audioCtx.destination);
            lock.type = 'square';
            lock.frequency.setValueAtTime(800, now + 1.4);
            lock.frequency.exponentialRampToValueAtTime(300, now + 1.55);
            lockGain.gain.setValueAtTime(0.3, now + 1.4);
            lockGain.gain.exponentialRampToValueAtTime(0.01, now + 1.6);
            lock.start(now + 1.4); lock.stop(now + 1.6);
        }

        // 기타 효과음
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'flip') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'match') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(659.25, now + 0.1); osc.frequency.setValueAtTime(783.99, now + 0.2);
                gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.3, now + 0.05); gain.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'wrong') {
                // 힘 있는 '땡!' 실패음: 금속성 기본음 + 낮은 울림
                const hit = audioCtx.createOscillator();
                const hitGain = audioCtx.createGain();
                hit.connect(hitGain); hitGain.connect(audioCtx.destination);
                hit.type = 'square';
                hit.frequency.setValueAtTime(360, now);
                hit.frequency.exponentialRampToValueAtTime(180, now + 0.18);
                hitGain.gain.setValueAtTime(0.42, now);
                hitGain.gain.exponentialRampToValueAtTime(0.01, now + 0.38);
                hit.start(now); hit.stop(now + 0.38);

                const ring = audioCtx.createOscillator();
                const ringGain = audioCtx.createGain();
                ring.connect(ringGain); ringGain.connect(audioCtx.destination);
                ring.type = 'sine';
                ring.frequency.setValueAtTime(145, now + 0.02);
                ring.frequency.linearRampToValueAtTime(110, now + 0.5);
                ringGain.gain.setValueAtTime(0.32, now + 0.02);
                ringGain.gain.exponentialRampToValueAtTime(0.01, now + 0.55);
                ring.start(now + 0.02); ring.stop(now + 0.55);
                return;
            } else if (type === 'tick') {
                osc.type = 'square'; osc.frequency.setValueAtTime(800, now);
                gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now); osc.stop(now + 0.05);
            } else if (type === 'tada') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(659.25, now + 0.1); osc.frequency.setValueAtTime(783.99, now + 0.2); osc.frequency.setValueAtTime(1046.50, now + 0.3);
                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0, now + 0.8);
                osc.start(now); osc.stop(now + 0.8);
            }
        }

        function playVictorySong() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const notes = [
                { f: 392.00, d: 0.15 }, { f: 523.25, d: 0.15 }, { f: 659.25, d: 0.15 }, { f: 783.99, d: 0.3 }, 
                { f: 659.25, d: 0.15 }, { f: 783.99, d: 0.3 },
                { f: 329.63, d: 0.15 }, { f: 440.00, d: 0.15 }, { f: 523.25, d: 0.15 }, { f: 659.25, d: 0.3 }, 
                { f: 523.25, d: 0.15 }, { f: 659.25, d: 0.3 },
                { f: 392.00, d: 0.15 }, { f: 493.88, d: 0.15 }, { f: 587.33, d: 0.15 }, { f: 783.99, d: 0.3 }, 
                { f: 783.99, d: 0.15 }, { f: 880.00, d: 0.15 }, { f: 987.77, d: 0.15 }, { f: 1046.50, d: 0.8 } 
            ];
            let time = audioCtx.currentTime;
            notes.forEach(n => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'square'; osc.frequency.value = n.f;
                gain.gain.setValueAtTime(0.15, time); gain.gain.exponentialRampToValueAtTime(0.01, time + n.d);
                osc.start(time); osc.stop(time + n.d); time += n.d;
            });
        }

        function shootConfetti() {
            var end = Date.now() + 4000;
            (function frame() {
                confetti({ particleCount: 6, angle: 60, spread: 55, origin: { x: 0 }, zIndex: 9999, colors: ['#ffd700', '#ff8c00', '#ffffff', '#fbbf24'] });
                confetti({ particleCount: 6, angle: 120, spread: 55, origin: { x: 1 }, zIndex: 9999, colors: ['#ffd700', '#ff8c00', '#ffffff', '#fbbf24'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }


        let activeInput = null;

        function escapeAttr(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        document.addEventListener('focusin', (e) => {
            if (e.target.tagName === 'INPUT') {
                activeInput = e.target;
            }
        });

        function insertSymbol(symbol) {
            if (!activeInput) {
                alert('먼저 암호 또는 해독키 입력칸을 눌러 주세요.');
                return;
            }

            const start = activeInput.selectionStart ?? activeInput.value.length;
            const end = activeInput.selectionEnd ?? activeInput.value.length;
            activeInput.value = activeInput.value.substring(0, start) + symbol + activeInput.value.substring(end);
            activeInput.focus();
            activeInput.selectionStart = activeInput.selectionEnd = start + symbol.length;
        }

        function insertFraction() {
            if (!activeInput) {
                alert('먼저 암호 또는 해독키 입력칸을 눌러 주세요.');
                return;
            }

            const start = activeInput.selectionStart ?? activeInput.value.length;
            const end = activeInput.selectionEnd ?? activeInput.value.length;
            const template = '()/()';
            activeInput.value = activeInput.value.substring(0, start) + template + activeInput.value.substring(end);
            activeInput.focus();
            // 분자 괄호 안으로 커서를 이동시켜 바로 입력할 수 있게 함
            activeInput.selectionStart = activeInput.selectionEnd = start + 1;
        }

        function populateEditList() {
            const editList = document.getElementById('edit-list');
            editList.innerHTML = '';
            currentPairs.forEach((pair, i) => {
                const row = document.createElement('div');
                row.classList.add('edit-row');
                let displayA = pair.a.replace(/\n/g, " ");
                row.innerHTML = `<span>${i + 1}번</span><input type="text" id="edit-q-${i}" value="${escapeAttr(pair.q)}" placeholder="암호 예: x² - 2x - 1 = 0"><input type="text" id="edit-a-${i}" value="${escapeAttr(displayA)}" placeholder="해독키 예: x = 1 ± √2, x = 1/2">`;
                editList.appendChild(row);
            });
        }

        function hideFrontControls() {
            const frontControls = document.getElementById('front-controls');
            const dial = document.getElementById('center-dial');
            const frontEditBtn = document.getElementById('front-edit-btn');
            if (frontControls) frontControls.classList.add('hidden');
            if (frontEditBtn) frontEditBtn.disabled = true;
            if (dial) dial.classList.add('unlocking');
        }

        function showFrontControls() {
            const frontControls = document.getElementById('front-controls');
            const dial = document.getElementById('center-dial');
            const frontEditBtn = document.getElementById('front-edit-btn');
            if (frontControls) frontControls.classList.remove('hidden');
            if (frontEditBtn) frontEditBtn.disabled = false;
            if (dial) {
                dial.classList.remove('unlocking');
                dial.style.opacity = '1';
                dial.style.pointerEvents = 'auto';
            }
        }

        // === 금고 애니메이션 ===
        function startVaultSequence() {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            hideFrontControls();
            playVaultOpenSound();

            setTimeout(() => {
                document.getElementById('door-left').classList.add('open');
                document.getElementById('door-right').classList.add('open');
                document.getElementById('game-section').style.display = 'block';
                document.getElementById('edit-section').style.display = 'none';
                document.getElementById('treasure-room').style.display = 'none';
                initGameCards();
            }, 500);
        }

        function closeVaultDoors(callback) {
            playVaultCloseSound();
            document.getElementById('door-left').classList.remove('open');
            document.getElementById('door-right').classList.remove('open');
            setTimeout(callback, 1800);
        }

        function openFrontEditMode() {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            hideFrontControls();
            playVaultOpenSound();

            setTimeout(() => {
                document.getElementById('door-left').classList.add('open');
                document.getElementById('door-right').classList.add('open');
                document.getElementById('game-section').style.display = 'none';
                document.getElementById('treasure-room').style.display = 'none';
                document.getElementById('edit-section').style.display = 'block';
                populateEditList();
            }, 500);
        }

        function openVaultDoors(callback) {
            playVaultOpenSound();
            document.getElementById('door-left').classList.add('open');
            document.getElementById('door-right').classList.add('open');
            setTimeout(callback, 1800);
        }

        // === 게임 로직 ===
        let currentPairs = [
            { q: "x² - 1 = 0", a: "x = 1\n또는\nx = -1" }, { q: "x² - 4 = 0", a: "x = 2\n또는\nx = -2" },
            { q: "x² - 9 = 0", a: "x = 3\n또는\nx = -3" }, { q: "x² - 16 = 0", a: "x = 4\n또는\nx = -4" },
            { q: "x² - 25 = 0", a: "x = 5\n또는\nx = -5" }, { q: "x² - 36 = 0", a: "x = 6\n또는\nx = -6" },
            { q: "x² - 3x + 2 = 0", a: "x = 1\n또는\nx = 2" }, { q: "x² - 5x + 6 = 0", a: "x = 2\n또는\nx = 3" },
            { q: "x² - x - 6 = 0", a: "x = -2\n또는\nx = 3" }, { q: "x² - 4x - 5 = 0", a: "x = -1\n또는\nx = 5" },
            { q: "x² - 7x + 10 = 0", a: "x = 2\n또는\nx = 5" }, { q: "x² + 4x + 3 = 0", a: "x = -1\n또는\nx = -3" }
        ];

        let cards = []; let firstCard = null; let secondCard = null; let lockBoard = false; let matchCount = 0;

        function initGameCards() {
            const board = document.getElementById('game-board'); board.innerHTML = '';
            cards = []; matchCount = 0; lockBoard = false; firstCard = null; secondCard = null;
            
            let idCounter = 0;
            currentPairs.forEach((pair, index) => {
                cards.push({ id: idCounter++, type: index, text: pair.q, cardType: 'question' });
                cards.push({ id: idCounter++, type: index, text: pair.a, cardType: 'answer' });
            });
            cards.sort(() => 0.5 - Math.random());

            cards.forEach((card, index) => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('card'); cardElement.dataset.type = card.type;
                const frontClass = card.cardType === 'question' ? 'question-front' : 'answer-front';
                const frontText = card.cardType === 'question' ? `암호 ${index + 1}` : `해독키 ${index + 1}`;
                cardElement.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-front ${frontClass}">${frontText}</div>
                        <div class="card-face card-back">${card.text}</div>
                    </div>`;
                cardElement.addEventListener('click', flipCard);
                board.appendChild(cardElement);
            });
        }

        function shuffleAgain() {
            closeVaultDoors(() => {
                initGameCards();
                openVaultDoors(()=>{});
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;
            playSound('flip'); this.classList.add('flipped');
            if (!firstCard) { firstCard = this; return; }
            secondCard = this; checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.type === secondCard.dataset.type;
            if (isMatch) {
                setTimeout(() => playSound('match'), 300); disableCards();
            } else {
                setTimeout(() => playSound('wrong'), 300); unflipCards();
            }
        }

        function disableCards() {
            firstCard.classList.add('matched'); secondCard.classList.add('matched');
            firstCard.removeEventListener('click', flipCard); secondCard.removeEventListener('click', flipCard);
            [firstCard, secondCard, lockBoard] = [null, null, false]; 
            matchCount++;
            
            if (matchCount === 12) {
                setTimeout(() => {
                    closeVaultDoors(() => {
                        document.getElementById('game-section').style.display = 'none';
                        document.getElementById('treasure-room').style.display = 'flex';
                        openVaultDoors(() => {
                            playVictorySong(); 
                            shootConfetti();   
                            startRoulette();
                        });
                    });
                }, 800);
            }
        }

        function unflipCards() {
            lockBoard = true;
            // 틀린 두 카드를 1.5초 동안 보여준 뒤 되돌립니다.
            setTimeout(() => {
                if (firstCard && secondCard) {
                    firstCard.classList.remove('flipped');
                    secondCard.classList.remove('flipped');
                }
                [firstCard, secondCard, lockBoard] = [null, null, false];
            }, 1500);
        }


        // 모둠 점수판
        const teamScores = [0, 0, 0, 0, 0, 0];

        function renderTeamScores() {
            const grid = document.getElementById('team-score-grid');
            if (!grid) return;
            grid.innerHTML = '';
            teamScores.forEach((score, index) => {
                const teamNumber = index + 1;
                const card = document.createElement('div');
                card.className = 'team-score-card';
                card.innerHTML = `
                    <div>${teamNumber}조</div>
                    <div class="team-score-value" id="team-score-${teamNumber}">${score}</div>
                    <div class="score-mini-buttons">
                        <button class="score-btn score-plus" type="button" onclick="addTeamScore(${teamNumber}, 1)">+1</button>
                        <button class="score-btn score-minus" type="button" onclick="addTeamScore(${teamNumber}, -1)">-1</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function addTeamScore(teamNumber, amount) {
            const index = teamNumber - 1;
            if (index < 0 || index >= teamScores.length) return;
            teamScores[index] = Math.max(0, teamScores[index] + amount);
            renderTeamScores();
            playSound(amount > 0 ? 'match' : 'tick');
        }

        function resetTeamScores() {
            for (let i = 0; i < teamScores.length; i++) teamScores[i] = 0;
            renderTeamScores();
            playSound('tick');
        }

        function pickPartnerTeam(manual = false) {
            const pickedTeam = Math.floor(Math.random() * 6) + 1;
            const target = document.getElementById('partner-team-display');
            if (target) target.innerText = `🤝 함께 받을 조: ${pickedTeam}조`;
            if (manual) playSound('tada');
            return pickedTeam;
        }

        // 사탕 배수 원판 룰렛
        const rewardRoulette = [
            { label: '🍬 사탕 1배', index: 0 },
            { label: '🍬 사탕 1배', index: 1 },
            { label: '🍬 사탕 1배', index: 2 },
            { label: '🍬 사탕 1배', index: 3 },
            { label: '🍭 사탕 2배', index: 4 },
            { label: '🤝 다른 조도 함께 받기', index: 5 }
        ];
        let rouletteRotation = 0;

        function startRoulette() {
            const display = document.getElementById('roulette-display');
            const msg = document.getElementById('roulette-msg');
            const wheel = document.getElementById('roulette-wheel');
            if (!wheel) return;

            display.classList.remove('blink');
            display.innerText = 'SPIN!';
            msg.innerText = '금고 속 사탕 배수 룰렛이 돌아갑니다...!';
            const partnerDisplay = document.getElementById('partner-team-display');
            if (partnerDisplay) partnerDisplay.innerText = '';

            const selected = rewardRoulette[Math.floor(Math.random() * rewardRoulette.length)];
            const segmentSize = 360 / 6;
            const segmentCenter = selected.index * segmentSize + segmentSize / 2;
            const extraTurns = 10 + Math.floor(Math.random() * 4);
            const targetRotation = rouletteRotation + (extraTurns * 360) + (360 - segmentCenter);
            rouletteRotation = targetRotation;

            wheel.style.transition = 'transform 8s cubic-bezier(0.08, 0.72, 0.12, 1)';
            wheel.style.transform = `rotate(${targetRotation}deg)`;

            let ticks = 0;
            const tickTimer = setInterval(() => {
                playSound('tick');
                ticks++;
                if (ticks > 68) clearInterval(tickTimer);
            }, 105);

            setTimeout(() => {
                clearInterval(tickTimer);
                playSound('tada');
                display.innerText = selected.label;
                display.classList.add('blink');
                if (selected.index === 4) {
                    msg.innerText = '✨ 2배 보상 당첨! 요원들에게 사탕을 2배 지급하세요! ✨';
                    shootConfetti();
                } else if (selected.index === 5) {
                    const partnerTeam = pickPartnerTeam(false);
                    display.innerText = `${selected.label} (${partnerTeam}조)`;
                    msg.innerText = `🤝 협력 보너스 발동! ${partnerTeam}조도 함께 보상을 받습니다!`;
                    shootConfetti();
                } else {
                    msg.innerText = '✨ 보상 지급 결과: 사탕 1배! ✨';
                }
            }, 8300);
        }

        function resetToBeginning() {
            closeVaultDoors(() => {
                document.getElementById('treasure-room').style.display = 'none';
                document.getElementById('game-section').style.display = 'none';
                showFrontControls();
            });
        }

        // 수정 로직
        function openEditMode() {
            closeVaultDoors(() => {
                document.getElementById('game-section').style.display = 'none';
                document.getElementById('edit-section').style.display = 'block';
                populateEditList();
                openVaultDoors(()=>{});
            });
        }

        function closeEditMode() {
            closeVaultDoors(() => {
                document.getElementById('edit-section').style.display = 'none'; 
                document.getElementById('game-section').style.display = 'block';
                openVaultDoors(()=>{});
            });
        }

        function saveAndStart() {
            for (let i = 0; i < 12; i++) {
                let qVal = document.getElementById(`edit-q-${i}`).value;
                let aVal = document.getElementById(`edit-a-${i}`).value;
                if (aVal.includes('또는') && !aVal.includes('\n')) {
                    aVal = aVal.replace('또는', '\n또는\n');
                }
                currentPairs[i] = { q: qVal, a: aVal };
            }

            closeVaultDoors(() => {
                hideFrontControls();
                document.getElementById('edit-section').style.display = 'none';
                document.getElementById('treasure-room').style.display = 'none';
                document.getElementById('game-section').style.display = 'block';
                initGameCards();
                openVaultDoors(()=>{});
            });
        }

        renderTeamScores();
    </script>
</body>
</html>
